<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Edgy black mouse">
  <!-- solid black field so it pops on light tabs -->
  <rect width="64" height="64" rx="12" fill="#0a0a0a"/>
  <!-- ears -->
  <circle cx="15" cy="20" r="13" fill="#f5f5f5"/>
  <circle cx="49" cy="20" r="13" fill="#f5f5f5"/>
  <circle cx="15" cy="20" r="7" fill="#111"/>
  <circle cx="49" cy="20" r="7" fill="#111"/>
  <!-- head -->
  <circle cx="32" cy="36" r="20" fill="#f5f5f5"/>
  <!-- unhinged eyes -->
  <ellipse cx="23" cy="32" rx="5.5" ry="6.5" fill="#0a0a0a"/>
  <ellipse cx="42" cy="33" rx="4" ry="5" fill="#0a0a0a"/>
  <circle cx="25" cy="30" r="2" fill="#fff"/>
  <circle cx="43.2" cy="31.5" r="1.4" fill="#fff"/>
  <!-- mad / dumb brows -->
  <path d="M16 25 L28 28" stroke="#0a0a0a" stroke-width="2.4" stroke-linecap="round"/>
  <path d="M48 24 L37 29" stroke="#0a0a0a" stroke-width="2.4" stroke-linecap="round"/>
  <!-- nose -->
  <ellipse cx="32" cy="40" rx="4" ry="3" fill="#0a0a0a"/>
  <!-- buck teeth -->
  <rect x="27" y="44" width="4.2" height="7" rx="1" fill="#fff" stroke="#0a0a0a" stroke-width="1.2"/>
  <rect x="32.5" y="44" width="4.2" height="7" rx="1" fill="#fff" stroke="#0a0a0a" stroke-width="1.2"/>
  <!-- whiskers -->
  <path d="M8 38 H20 M7 42 H20 M9 34 H20" stroke="#f5f5f5" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M44 38 H56 M44 42 H57 M44 34 H55" stroke="#f5f5f5" stroke-width="1.8" stroke-linecap="round"/>
  <!-- neon green $ crumb -->
  <circle cx="52" cy="12" r="8" fill="#00ff88"/>
  <text x="52" y="16" text-anchor="middle" font-size="12" font-family="ui-monospace,monospace" font-weight="900" fill="#0a0a0a">$</text>
</svg>
